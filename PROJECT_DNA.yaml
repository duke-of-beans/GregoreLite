    rationale: "AEGIS must log signal data from Day 1. Correlation model needs weeks of data first."

  - date: "2026-02-28"
    decision: "Public API is Gregore (full) feature, not Gregore Lite"
    rationale: "Don't shape architecture prematurely for platform needs"

