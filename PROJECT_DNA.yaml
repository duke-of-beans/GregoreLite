  - date: "2026-02-28"
    decision: "Gregore design system carries over completely"
    rationale: "CSS variables, animations, dark theme, Geyser G branding — direct copy"

  - date: "2026-02-28"
    decision: "Session end is inferred, not signaled"
    rationale: "Three triggers: Tauri on_window_event, idle timeout (20min default), explicit thread close"

  - date: "2026-02-28"
    decision: "TECHNICAL_STANDARDS.md and CLAUDE_INSTRUCTIONS.md are Phase 1 inputs"
    rationale: "Bootstrap sequence loads dev protocols the same way it loads KERNL context"

  - date: "2026-02-28"
