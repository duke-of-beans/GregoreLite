    rationale: "Programmatic spawn, manifest-as-system-prompt injection, streaming results"

  - date: "2026-02-28"
    decision: "Ghost Thread gets full disk + all email/inbox access"
    rationale: "David explicitly approved. Ghost needs full context awareness to be valuable."

  - date: "2026-02-28"
    decision: "War Room Dependency Visualization is Phase 2, not cut"
    rationale: "Phase 1 must carry dependency graph fields in manifest schema from day one"

  - date: "2026-02-28"
    decision: "Self-Evolution Mode is in scope — Phase 5 or post-launch"
